<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#efe1cc">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trio">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Trio</title>
    <link rel="stylesheet" href="theme.css">
    <script>
      if (
        window.matchMedia("(display-mode: standalone)").matches ||
        window.matchMedia("(display-mode: fullscreen)").matches ||
        window.navigator.standalone
      ) {
        document.documentElement.classList.add("standalone");
      }
    </script>
  </head>
  <body>
    <div id="app" class="app">
      <header class="app-header">
        <div class="header-board">
          <h2>Trio</h2>
          <button class="help-button" type="button" onclick="openHelp()">?</button>
        </div>
        <div id="counter">
          Anzahl: <span id="countValue">0</span>
          &nbsp;&nbsp;&nbsp;Zeit: <span id="timeValue">0</span>s
          &nbsp;&nbsp;&nbsp;Gitter: <span id="gridSizeValue">—</span>
        </div>
      </header>

      <main class="app-scroll">
        <div class="board-area">
          <div id="grid"></div>
        </div>
      </main>

      <nav class="bottom-bar" aria-label="Spielaktionen">
        <button type="button" onclick="revealNext()">Aufdecken</button>
        <button type="button" onclick="generateGrid()">Neues Spiel</button>
      </nav>
    </div>
    <script src="app.js" defer></script>
  </body>
</html>
