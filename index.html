<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#efe1cc">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Trio">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Trio</title>
    <link rel="stylesheet" href="theme.css">
  </head>
  <body>
    <div class="wood-bg" aria-hidden="true"></div>
    <div class="app">
      <button class="help-button" onclick="openHelp()">?</button>
      <h2>Trio</h2>
      <div id="counter">
        Anzahl: <span id="countValue">0</span>
        &nbsp;&nbsp;&nbsp;Zeit: <span id="timeValue">0</span>s
      </div>
      <div id="grid"></div>
      <div class="controls">
        <button onclick="revealNext()">Aufdecken</button>
        <button onclick="generateGrid()">Neues Spiel</button>
      </div>
    </div>
    <script src="app.js" defer></script>
  </body>
</html>
